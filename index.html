<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Lynx</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Courier New", monospace;
      background: linear-gradient(180deg, #111 0%, #1b1b1b 100%);
      color: white;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      padding: 30px;
      background: #1b1b1b;
      border: 2px solid #7b5d31;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    h1 {
      margin-top: 0;
      color: #75b6ff;
      letter-spacing: 2px;
    }

    h2 {
      margin-top: 0;
    }

    p {
      line-height: 1.6;
    }

    .answer-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: #333;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s ease;
    }

    .answer-btn:hover {
      background: #555;
    }

    .answer-btn.correct {
      background: #1f8b4c;
      box-shadow: 0 0 12px rgba(80, 255, 140, 0.45);
    }

    .answer-btn.wrong {
      background: #9b2d2d;
      box-shadow: 0 0 12px rgba(255, 90, 90, 0.45);
    }

    .answer-btn:disabled {
      cursor: default;
      opacity: 1;
    }

    .final-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 12px;
      background: #241f19;
      line-height: 1.8;
      border: 1px solid rgba(183,154,101,0.22);
    }

    .success {
      color: #9ecaff;
      font-weight: bold;
      font-size: 22px;
    }

    .fail {
      color: #ff8d8d;
      font-weight: bold;
      font-size: 22px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>MISSION LYNX</h1>
    <div id="quiz"></div>
  </div>

  <audio id="good" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3" preload="auto"></audio>
  <audio id="bad" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3" preload="auto"></audio>

  <script>
    const questions = [
      {
        q: "Quels sont les noms des 3 héros ?",
        a: [
          "Esther, Léo et Marius",
          "Lisa, Eusèbe et Louis",
          "Monica, Martin et François",
          "Lisa, Eusèbe et François"
        ],
        correct: 3
      },
      {
        q: "Dans quel pays se passe l'histoire ?",
        a: [
          "France",
          "Angleterre",
          "Allemagne",
          "Espagne"
        ],
        correct: 0
      },
      {
        q: "Comment s'appelle le réseau créé par les enfants ?",
        a: [
          "Le Faucon",
          "Le Lynx",
          "Le Hibou",
          "Le Renard"
        ],
        correct: 1
      },
      {
        q: "Comment s'appelle le village ?",
        a: [
          "Pontain-l'Écluse",
          "Montfermeil",
          "Val-des-Bois",
          "Saint-Rémy"
        ],
        correct: 0
      },
      {
        q: "Quel personnage est d'origine allemande ?",
        a: [
          "François",
          "Eusèbe",
          "Lisa",
          "Le père de François"
        ],
        correct: 2
      },
      {
        q: "Quel personnage est abattu par les Allemands ?",
        a: [
          "Le maire",
          "Marcel",
          "Eusèbe",
          "Jules"
        ],
        correct: 1
      },
      {
        q: "Qu'est-ce que les enfants ont cassé pour inonder le village ?",
        a: [
          "Des bouteilles",
          "Un barrage hydraulique",
          "La canalisation",
          "Le pont"
        ],
        correct: 2
      },
      {
        q: "Qui collabore avec les Allemands ?",
        a: [
          "Le patron du bar",
          "L'instituteur",
          "Le facteur",
          "Le médecin"
        ],
        correct: 0
      },
      {
        q: "Quel est le métier du père d’Eusèbe ?",
        a: [
          "Médecin",
          "Instituteur",
          "Agriculteur",
          "Gendarme"
        ],
        correct: 1
      }
    ];

    let current = 0;
    let locked = false;

    function showQuestion() {
      const q = questions[current];

      document.getElementById("quiz").innerHTML = `
        <h2>Question ${current + 1}/${questions.length}</h2>
        <p>${q.q}</p>
        ${q.a.map((choice, i) => `
          <button class="answer-btn" data-index="${i}" onclick="answer(${i})">${choice}</button>
        `).join("")}
      `;
    }

    function answer(i) {
      if (locked) return;
      locked = true;

      const q = questions[current];
      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach(btn => btn.disabled = true);

      if (i === q.correct) {
        buttons[i].classList.add("correct");
        playSound("good");

        setTimeout(() => {
          current++;
          if (current < questions.length) {
            showQuestion();
            locked = false;
          } else {
            endQuiz();
          }
        }, 700);

      } else {
        buttons[i].classList.add("wrong");
        buttons[q.correct].classList.add("correct");
        playSound("bad");

        setTimeout(() => {
          document.getElementById("quiz").innerHTML = `
            <div class="final-box">
              <div class="fail">Mauvaise réponse</div>
              <p>Mission compromise.</p>
              <p>Retour au début...</p>
            </div>
          `;
        }, 700);

        setTimeout(() => {
          restartQuiz();
          locked = false;
        }, 1800);
      }
    }

    function endQuiz() {
      document.getElementById("quiz").innerHTML = `
        <div class="final-box">
          <div class="success">Mission validée</div>
          <p>Vous avez trouvé toutes les bonnes réponses.</p>
          <p>Allez voir votre chef d'équipe sous le hangar.</p>
        </div>
      `;
    }

    function restartQuiz() {
      current = 0;
      showQuestion();
    }

    function playSound(id) {
      const sound = document.getElementById(id);
      if (!sound) return;
      sound.pause();
      sound.currentTime = 0;
      sound.play().catch(() => {});
    }

    showQuestion();
  </script>

</body>
</html>
