<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Lynx</title>

<style>
* { box-sizing: border-box; }

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:"Courier New", monospace;
  background:#111;
  color:white;
  padding:20px;
}

.card{
  width:100%;
  max-width:760px;
  padding:30px;
  background:#1b1b1b;
  border-radius:14px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h1{
  color:#75b6ff;
}

.question-block{
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

button{
  display:block;
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#333;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  transition:0.2s;
}

button:hover{
  background:#555;
}

.good{
  background:#2e7d32 !important;
}

.bad{
  background:#b71c1c !important;
}

.final-box{
  margin-top:20px;
  padding:18px;
  border-radius:12px;
  background:#241f19;
  line-height:1.8;
  animation: fadeIn 0.5s ease;
}

.success{
  color:#9ecaff;
  font-size:22px;
  font-weight:bold;
}

.fail{
  color:#ff8d8d;
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
  <h1>MISSION LYNX</h1>
  <div id="quiz"></div>
</div>

<script>
const questions = [
{
q:"Quels sont les noms des 3 héros ?",
a:[
"Esther, Léo et Marius",
"Lisa, Eusèbe et Louis",
"Monica, Martin et François",
"Lisa, Eusèbe et François"
],
correct:3
},
{
q:"Dans quel pays se passe l'histoire ?",
a:["France","Angleterre","Allemagne","Espagne"],
correct:0
},
{
q:"Comment s'appelle le réseau créé par les enfants ?",
a:["Le Faucon","Le Lynx","Le Hibou","Le Renard"],
correct:1
},
{
q:"Comment s'appelle le village ?",
a:["Pontain-l'Écluse","Montfermeil","Val-des-Bois","Saint-Rémy"],
correct:0
},
{
q:"Quel personnage est d'origine allemande ?",
a:["François","Eusèbe","Lisa","Le père de François"],
correct:2
},
{
q:"Quel personnage est abattu par les Allemands ?",
a:["Le maire","Pégase","Eusèbe","Jules"],
correct:1
},
{
q:"Qu'est-ce que les enfants détruisent pour provoquer l'inondation du village ?",
a:["Un barrage","Une canalisation","Un pont","Une écluse"],
correct:3
},
{
q:"Qui collabore avec les Allemands ?",
a:["Le patron du bar","L'instituteur","Le facteur","Le médecin"],
correct:0
}
];

let current = 0;

function beep(freq, duration){
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) return;
  const ctx = new AudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(ctx.destination);
  gain.gain.value = 0.05;
  osc.start();
  setTimeout(() => {
    osc.stop();
    ctx.close();
  }, duration);
}

function showQuestion(){
  const q = questions[current];

  document.getElementById("quiz").innerHTML = `
    <div class="question-block">
      <h2>Question ${current + 1}/${questions.length}</h2>
      <p>${q.q}</p>
      ${q.a.map((choice, i) => `
        <button onclick="answer(${i}, this)">${choice}</button>
      `).join("")}
    </div>
  `;
}

function answer(i, btn){
  const correct = (i === questions[current].correct);

  if(correct){
    btn.classList.add("good");
    beep(800, 120);

    setTimeout(() => {
      current++;
      if(current < questions.length){
        showQuestion();
      } else {
        endQuiz();
      }
    }, 500);

  } else {
    btn.classList.add("bad");
    beep(200, 220);

    setTimeout(() => {
      failQuiz();
    }, 500);
  }
}

function endQuiz(){
  beep(900, 120);
  setTimeout(() => beep(1100, 150), 120);

  document.getElementById("quiz").innerHTML = `
    <div class="final-box">
      <div class="success">Mission validée</div>
      <p>Vous avez trouvé toutes les bonnes réponses.</p>
      <p>Allez voir votre chef d'équipe<br><strong>sous le hangar</strong>.</p>
    </div>
  `;
}

function failQuiz(){
  document.getElementById("quiz").innerHTML = `
    <div class="final-box">
      <div class="fail">Mauvaise réponse</div>
      <p>La mission est compromise.</p>
      <p>Vous devez recommencer depuis le début.</p>
      <button onclick="restartQuiz()">Recommencer</button>
    </div>
  `;
}

function restartQuiz(){
  current = 0;
  showQuestion();
}

showQuestion();
</script>

</body>
</html>
